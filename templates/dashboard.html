<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - talkfreepy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body#dashboard {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            background-attachment: fixed;
        }
        .navbar {
            border-radius: 0 0 1rem 1rem;
            box-shadow: 0 4px 24px 0 rgba(30,60,114,0.15);
        }
        .card {
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 1.2rem;
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.18);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            margin-bottom: 2rem;
        }
        .card-header {
            background: rgba(255,255,255,0.25);
            border-bottom: none;
            border-radius: 1.2rem 1.2rem 0 0;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .form-control, .btn {
            border-radius: 2rem;
        }
        .btn-success, .btn-primary {
            box-shadow: 0 2px 8px 0 rgba(46,204,113,0.12);
            font-weight: 500;
        }
        .btn-danger {
            box-shadow: 0 2px 8px 0 rgba(231,76,60,0.12);
            font-weight: 500;
        }
        .list-group-item {
            background: rgba(255,255,255,0.35);
            border: none;
            border-radius: 1rem !important;
            margin-bottom: 0.5rem;
            box-shadow: 0 1px 4px 0 rgba(30,60,114,0.07);
        }
        .online-indicator {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            background: #bbb;
        }
        .online-indicator.online { background: #2ecc40; }
        .online-indicator.in-call { background: #f1c40f; }
        .online-indicator.offline { background: #e74c3c; }
        .call-modal {
            background: rgba(255,255,255,0.95);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.18);
            padding: 2rem 2.5rem;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1200;
            display: none;
            min-width: 320px;
        }
        .call-modal.active { display: block; animation: fadeIn 0.3s; }
        .overlay.active {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(30,60,114,0.25);
            z-index: 1100;
            display: block;
        }
        .overlay { display: none; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%,-60%); }
            to { opacity: 1; transform: translate(-50%,-50%); }
        }
        #toastContainer .toast {
            font-size: 1rem;
            border-radius: 1rem;
            min-width: 260px;
        }
        @media (max-width: 768px) {
            .call-modal { min-width: 90vw; padding: 1.2rem; }
        }
    </style>
</head>
<body id="dashboard">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">talkfreepy - Welcome, {{ user.username }}</span>
            <div>
                <button id="logoutBtn" class="btn btn-outline-light">Logout</button>
                <button id="deleteAccount" class="btn btn-outline-danger">Delete Account</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- Contact List -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Contacts</h5>
                        <input type="text" id="searchUser" class="form-control" placeholder="Search users...">
                        <ul id="searchResults" class="list-group mt-2"></ul>
                    </div>
                    <div class="card-body">
                        <ul id="contactList" class="list-group"></ul>
                    </div>
                </div>
            </div>

            <!-- Pending Requests -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Pending Friend Requests</h5>
                    </div>
                    <div class="card-body">
                        <ul id="pendingList" class="list-group"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toasts -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
      <div id="toastContainer"></div>
    </div>

    <!-- Call Modals -->
    <div class="overlay"></div>

    <div id="incomingCallModal" class="call-modal">
        <h5>Incoming Call</h5>
        <p>From: <span id="incomingCaller"></span></p>
        <button id="acceptCall" class="btn btn-success">Accept</button>
        <button id="rejectCall" class="btn btn-danger">Reject</button>
    </div>

    <div id="outgoingCallModal" class="call-modal">
        <h5>Outgoing Call</h5>
        <p id="callStatus"></p>
        <button id="cancelCall" class="btn btn-danger">Cancel</button>
    </div>

    <div id="activeCallModal" class="call-modal">
        <h5>In Call</h5>
        <p>Talking to <span id="activeCallUser"></span></p>
        <button id="endActiveCall" class="btn btn-danger">End Call</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
