<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - talkfreepy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body id="dashboard">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">talkfreepy - Welcome, {{ user.username }}</span>
            <div>
                <button id="logoutBtn" class="btn btn-outline-light">Logout</button>
                <button id="deleteAccount" class="btn btn-outline-danger">Delete Account</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- Contact List -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Contacts</h5>
                        <input type="text" id="searchUser" class="form-control" placeholder="Search users...">
                        <ul id="searchResults" class="list-group mt-2"></ul>
                    </div>
                    <div class="card-body">
                        <ul id="contactList" class="list-group"></ul>
                    </div>
                </div>
            </div>

            <!-- Pending Requests -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Pending Friend Requests</h5>
                    </div>
                    <div class="card-body">
                        <ul id="pendingList" class="list-group"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Call Modals -->
    <div class="overlay"></div>

    <div id="incomingCallModal" class="call-modal">
        <h5>Incoming Call</h5>
        <p>From: <span id="incomingCaller"></span></p>
        <button id="acceptCall" class="btn btn-success">Accept</button>
        <button id="rejectCall" class="btn btn-danger">Reject</button>
    </div>

    <div id="outgoingCallModal" class="call-modal">
        <h5>Outgoing Call</h5>
        <p id="callStatus"></p>
        <button id="cancelCall" class="btn btn-danger">Cancel</button>
    </div>

    <div id="activeCallModal" class="call-modal">
        <h5>In Call</h5>
        <p>Talking to <span id="activeCallUser"></span></p>
        <button id="endActiveCall" class="btn btn-danger">End Call</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
