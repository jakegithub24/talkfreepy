<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>talkfreepy - Voice over IP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="hero">
        <div class="container">
            <h1>talkfreepy</h1>
            <p class="lead">Free voice calls over the internet</p>
        </div>
    </div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <!-- Login Form -->
                        <div id="loginForm">
                            <h3 class="text-center">Login</h3>
                            <input type="text" id="loginUsername" class="form-control mb-2" placeholder="Username">
                            <input type="password" id="loginPassword" class="form-control mb-2" placeholder="Password">
                            <button id="loginBtn" class="btn btn-primary w-100">Login</button>
                            <p class="text-center mt-3">
                                <a href="#" id="showRegister">Don't have an account? Register</a><br>
                                <a href="{{ url_for('reset_password') }}">Forgot password?</a>
                            </p>
                        </div>

                        <!-- Register Form (hidden initially) -->
                        <div id="registerForm" style="display: none;">
                            <h3 class="text-center">Register</h3>
                            <input type="text" id="regUsername" class="form-control mb-2" placeholder="Username">
                            <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email (optional)">
                            <input type="password" id="regPassword" class="form-control mb-2" placeholder="Password">
                            <button id="registerBtn" class="btn btn-success w-100">Register</button>
                            <p class="text-center mt-3">
                                <a href="#" id="showLogin">Already have an account? Login</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
